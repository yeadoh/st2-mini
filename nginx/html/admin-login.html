<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인</title>
    <style>
        /* admin.html과 통일감 있는 깔끔한 UI */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; /* 화면 전체 높이 사용 */
            margin: 0;
        }
        .login-container { 
            background: white; 
            padding: 40px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 350px; 
            text-align: center;
        }
        .login-container h2 { 
            margin-top: 0; 
            color: #333; 
            margin-bottom: 25px;
        }
        .input-group { 
            margin-bottom: 15px; 
            text-align: left; 
        }
        .input-group label { 
            display: block; 
            margin-bottom: 5px; 
            font-weight: bold; 
            color: #555; 
            font-size: 14px;
        }
        .input-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; /* padding 포함해서 너비 100% 맞춤 */
        }
        .login-btn { 
            width: 100%; 
            padding: 12px; 
            background-color: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold; 
            margin-top: 10px;
        }
        .login-btn:hover { 
            background-color: #0056b3; 
        }
        .error-msg {
            color: #dc3545;
            font-size: 13px;
            margin-top: 10px;
            display: none; /* 평소엔 숨겨둠 */
        }
    </style>
</head>
<body>

<div class="login-container">
    <h2>🔐 관리자 로그인</h2>
    
    <form id="login-form">
        <div class="input-group">
            <label for="email">이메일</label>
            <input type="email" id="email" placeholder="admin@example.com" required>
        </div>
        
        <div class="input-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
        </div>

        <button type="submit" class="login-btn">로그인</button>
        <div id="error-msg" class="error-msg">이메일 또는 비밀번호를 확인해주세요.</div>
    </form>
</div>

<script>
    // ==========================================
    // ⚙️ [환경 설정 영역]
    // ==========================================
    const API_BASE_URL = '/api/admin'; 

    document.getElementById('login-form').addEventListener('submit', async function(event) {
        // 폼 기본 제출(새로고침) 방지
        event.preventDefault(); 

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');
        
        errorMsg.style.display = 'none'; // 에러 메시지 초기화

        try {
            // 💡 [백엔드 연동 포인트] 로그인 API 호출 (POST)
            const response = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            if (!response.ok) {
                // 401(인증 실패) 등의 에러가 나면 메시지 표시
                throw new Error('로그인 실패');
            }

            const result = await response.json();

            // ==========================================
            // 🔑 핵심: 발급받은 JWT 토큰을 브라우저에 저장합니다.
            // ==========================================
            if (result.access_token) {
                localStorage.setItem('admin_token', result.access_token);
                
                // 토큰 저장 성공 시 회원 관리 페이지로 이동
                window.location.href = 'admin.html'; 
            } else {
                throw new Error('토큰이 없습니다.');
            }

        } catch (error) {
            console.error('Login Error:', error);
            errorMsg.style.display = 'block'; // 실패 시 에러 메시지 노출
        }
    });
</script>

</body>
</html>
