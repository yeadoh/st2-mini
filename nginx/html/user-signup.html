<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; padding: 20px; }
        .signup-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.9em; margin-bottom: 5px; color: #333; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .login-link { text-align: center; margin-top: 15px; font-size: 0.9em; }
        .login-link a { color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-container">
    <h2 style="text-align: center;">회원가입</h2>
    <form id="signup-form">
        <div class="form-group">
            <label for="email">이메일 *</label>
            <input type="email" id="email" required placeholder="example@domain.com">
        </div>
        <div class="form-group">
            <label for="password">비밀번호 *</label>
            <input type="password" id="password" required>
        </div>
        <div class="form-group">
            <label for="name">이름 (실명) *</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="nickname">닉네임 *</label>
            <input type="text" id="nickname" required>
        </div>
        <div class="form-group">
            <label for="phone">전화번호 *</label>
            <input type="text" id="phone" required placeholder="010-0000-0000">
        </div>
        <div class="form-group">
            <label for="gender">성별 *</label>
            <select id="gender" required>
                <option value="M">남성 (M)</option>
                <option value="F">여성 (F)</option>
                <option value="OTHER">선택안함 (OTHER)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="birth">생년월일</label>
            <input type="date" id="birth">
        </div>
        
        <button type="submit">가입하기</button>
    </form>
    <div class="login-link">
        이미 계정이 있으신가요? <a href="user-login.html">로그인 하기</a>
    </div>
</div>

<script>
    const API_SIGNUP_URL = '/api/user/signup';

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // 폼 데이터 수집
        const payload = {
            user_email: document.getElementById('email').value,
            user_passwd: document.getElementById('password').value,
            user_name: document.getElementById('name').value,
            user_nickname: document.getElementById('nickname').value,
            user_phone: document.getElementById('phone').value,
            user_gender: document.getElementById('gender').value,
            user_birth: document.getElementById('birth').value || null // 빈 값이면 null 처리
        };

        try {
            const response = await fetch(API_SIGNUP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('회원가입이 완료되었습니다! 로그인 페이지로 이동합니다.');
                window.location.href = 'user-login.html'; // 가입 성공 시 로그인 창으로 이동
            } else {
                const errorData = await response.json();
                alert(`가입 실패: ${errorData.detail}`);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('서버와 통신 중 오류가 발생했습니다.');
        }
    });
</script>

</body>
</html>
