<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사용자 로그인</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .login-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        .form-group { margin-bottom: 1rem; }
        input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        .signup-link { text-align: center; margin-top: 15px; font-size: 0.9em; }
        .signup-link a { color: #0066cc; text-decoration: none; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>로그인</h2>
    <form id="login-form">
        <div class="form-group">
            <label for="email">이메일</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label for="password">비밀번호</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">로그인</button>
    </form>
    <div class="signup-link">
        아직 회원이 아니신가요? <a href="user-signup.html">회원가입 하기</a>
    </div>
</div>

<script>
    // 💡 도메인이 바뀌어도 알아서 찾아가는 상대 경로!
    const API_LOGIN_URL = '/api/user/login';

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch(API_LOGIN_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                const data = await response.json();
                // 발급받은 토큰을 로컬 스토리지에 저장 (친구가 게시판에서 꺼내 쓸 예정)
                localStorage.setItem('user_token', data.access_token);
                alert('로그인 성공!');
                // TODO: 로그인 성공 후 이동할 페이지 (예: 친구가 만든 메인 게시판)
                window.location.href = '/user-dashboard.html'; 
            } else {
                const errorData = await response.json();
                alert(`로그인 실패: ${errorData.detail}`);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('서버와 통신 중 오류가 발생했습니다.');
        }
    });
</script>

</body>
</html>
