<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 회원 관리</title>
    <style>
        /* 최소한의 CSS로 깔끔한 대시보드 느낌 구현 */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* 검색 영역 */
        .search-area { display: flex; gap: 10px; margin-bottom: 20px; }
        select, input, button { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #0056b3; }

        /* 테이블 영역 */
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f8f9fa; }
        tr:hover { background-color: #f1f1f1; cursor: pointer; }

        /* 페이징 */
        .pagination { display: flex; justify-content: center; gap: 5px; }
        .page-btn { padding: 5px 10px; background: #eee; color: #333; text-decoration: none; border-radius: 4px; }
        .page-btn.active { background: #007bff; color: white; }

        /* 모달 팝업 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 400px; }
        .modal-header { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .modal-body p { margin: 10px 0; display: flex; justify-content: space-between; border-bottom: 1px dashed #eee; padding-bottom: 5px;}
        .modal-body input, .modal-body select { width: 60%; padding: 4px; }
        .modal-footer { margin-top: 20px; text-align: right; }
        .close-btn { cursor: pointer; font-size: 20px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>👥 회원 관리 (총 <span id="total-count">0</span>명)</h2>
    
    <div class="search-area">
        <select id="search-type">
            <option value="user_email">이메일</option>
            <option value="user_name">이름</option>
            <option value="user_nickname">닉네임</option>
        </select>
        <input type="text" id="search-keyword" placeholder="검색어 입력">
        <button onclick="handleSearch()">검색</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>이메일</th>
                <th>이름</th>
                <th>닉네임</th>
                <th>상태</th>
                <th>등급</th>
            </tr>
        </thead>
        <tbody id="user-table-body">
            </tbody>
    </table>

    <div class="pagination" id="pagination">
        </div>
</div>

<div class="modal-overlay" id="user-modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>상세 정보</span>
            <span class="close-btn" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body" id="modal-body">
        </div>
        <div class="modal-footer" id="modal-footer">
        </div>
    </div>
</div>

<script>
    // ==========================================
    // ⚙️ [환경 설정 영역]
    // ==========================================
    const API_BASE_URL = '/api/admin'; // EKS 배포용 (상대 경로)
    const ITEMS_PER_PAGE = 25;

    // 전역 상태 변수
    let currentPage = 1;
    let currentDetailUserId = null;

    // 💡 1. 페이지가 로드될 때 단 한 번만 실행 (중복 제거 완료)
    window.onload = function() {
        const token = localStorage.getItem('admin_token');
        
        if (!token) {
            alert("로그인이 필요한 서비스입니다.");
            window.location.href = 'login.html';
            return;
        }
        
        loadUsers(1);
    };

    // 💡 2. 공통 인증 헤더 생성 함수 (중복 코드를 줄여줍니다)
    function getAuthHeaders() {
        const token = localStorage.getItem('admin_token');
        return {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        };
    }

    // -----------------------------------------------------
    // 1. 유저 리스트 조회 (GET 요청)
    // -----------------------------------------------------
    async function loadUsers(page = 1, searchType = '', keyword = '') {
        currentPage = page;
        try {
            let url = `${API_BASE_URL}/user?page=${page}&limit=${ITEMS_PER_PAGE}`;
            if (keyword.trim() !== '') {
                url += `&search_type=${searchType}&keyword=${encodeURIComponent(keyword)}`;
            }

            // 토큰을 실어서 요청
            const response = await fetch(url, {
                headers: getAuthHeaders()
            });

            // 💡 3. 토큰이 만료되었거나 가짜면 쫓아냅니다
            if (response.status === 401) {
                localStorage.removeItem('admin_token');
                alert("인증이 만료되었습니다. 다시 로그인해주세요.");
                window.location.href = 'login.html';
                return;
            }

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const result = await response.json();
            
            document.getElementById('total-count').innerText = result.total_users || 0;
            renderTable(result.items || []);
            renderPagination(result.total_pages || 1);

        } catch (error) {
            alert('데이터를 불러오는데 실패했습니다. 서버 상태를 확인해주세요.');
            console.error('List Load Error:', error);
            renderTable([]);
            document.getElementById('total-count').innerText = 0;
            renderPagination(1);
        }
    }

    function renderTable(items) {
        const tbody = document.getElementById('user-table-body');
        tbody.innerHTML = ''; 

        if (!items || items.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">조회된 데이터가 없습니다.</td></tr>';
            return;
        }

        items.forEach(user => {
            const tr = document.createElement('tr');
            tr.onclick = () => openDetailModal(user.user_id);
            tr.innerHTML = `
                <td>${user.user_id}</td>
                <td>${user.user_email}</td>
                <td>${user.user_name}</td>
                <td>${user.user_nickname}</td>
                <td>${user.user_status === 'ACTIVE' ? '🟢 정상' : user.user_status === 'DELETING' ? '🔴 탈퇴중' : '⚫ 탈퇴완료'}</td>
                <td>${user.user_level === 'MANAGER' ? '👑 관리자' : '일반'}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // -----------------------------------------------------
    // 2. 페이징 및 검색 처리
    // -----------------------------------------------------
    function renderPagination(totalPages) {
        const pagination = document.getElementById('pagination');
        pagination.innerHTML = '';
        for (let i = 1; i <= totalPages; i++) {
            const btn = document.createElement('a');
            btn.href = '#';
            btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
            btn.innerText = i;
            btn.onclick = (e) => { e.preventDefault(); loadUsers(i); };
            pagination.appendChild(btn);
        }
    }

    function handleSearch() {
        const type = document.getElementById('search-type').value;
        const keyword = document.getElementById('search-keyword').value;
        loadUsers(1, type, keyword);
    }

    // -----------------------------------------------------
    // 3. 상세 보기 및 모달 컨트롤 (GET 요청)
    // -----------------------------------------------------
    async function openDetailModal(userId) {
        currentDetailUserId = userId;
        document.getElementById('user-modal').style.display = 'flex';
        const body = document.getElementById('modal-body');
        body.innerHTML = '데이터를 불러오는 중...';

        try {
            const response = await fetch(`${API_BASE_URL}/user/${userId}`, {
                headers: getAuthHeaders() // 상세 조회 시에도 토큰 필수
            });
            
            if (response.status === 401) {
                localStorage.removeItem('admin_token');
                alert("인증이 만료되었습니다. 다시 로그인해주세요.");
                window.location.href = 'login.html';
                return;
            }

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const user = await response.json();
            renderModalViewMode(user);

        } catch (error) {
            body.innerHTML = '오류가 발생했습니다. 유저 상세 정보를 가져올 수 없습니다.';
            console.error('Detail Load Error:', error);
        }
    }

    function renderModalViewMode(user) {
        const body = document.getElementById('modal-body');
        body.innerHTML = `
            <p><strong>ID:</strong> <span>${user.user_id}</span></p>
            <p><strong>이메일:</strong> <span>${user.user_email}</span></p>
            <p><strong>이름:</strong> <span id="view-name">${user.user_name}</span></p>
            <p><strong>닉네임:</strong> <span id="view-nickname">${user.user_nickname}</span></p>
            <p><strong>연락처:</strong> <span id="view-phone">${user.user_phone}</span></p>
            <p><strong>상태:</strong> <span id="view-status">${user.user_status}</span></p>
            <p><strong>등급:</strong> <span id="view-level">${user.user_level}</span></p>
            <p><strong>작성글 수:</strong> <span>${user.post_count || 0} 개</span></p>
        `;
        document.getElementById('modal-footer').innerHTML = `
            <button onclick='renderModalEditMode(${JSON.stringify(user)})' style="background-color: #ffc107; color: black;">정보 수정</button>
        `;
    }

    function closeModal() {
        document.getElementById('user-modal').style.display = 'none';
    }

    // -----------------------------------------------------
    // 4. 정보 수정 및 저장 (PATCH 요청)
    // -----------------------------------------------------
    function renderModalEditMode(user) {
        const body = document.getElementById('modal-body');
        body.innerHTML = `
            <p><strong>ID:</strong> <span>${user.user_id} (수정불가)</span></p>
            <p><strong>이메일:</strong> <span>${user.user_email} (수정불가)</span></p>
            <p><strong>이름:</strong> <input type="text" id="edit-name" value="${user.user_name}"></p>
            <p><strong>닉네임:</strong> <input type="text" id="edit-nickname" value="${user.user_nickname}"></p>
            <p><strong>연락처:</strong> <input type="text" id="edit-phone" value="${user.user_phone}"></p>
            <p><strong>상태:</strong> 
                <select id="edit-status">
                    <option value="ACTIVE" ${user.user_status === 'ACTIVE' ? 'selected' : ''}>ACTIVE</option>
                    <option value="DELETING" ${user.user_status === 'DELETING' ? 'selected' : ''}>DELETING</option>
                    <option value="OUT" ${user.user_status === 'OUT' ? 'selected' : ''}>OUT</option>
                </select>
            </p>
            <p><strong>등급:</strong> 
                <select id="edit-level">
                    <option value="USER" ${user.user_level === 'USER' ? 'selected' : ''}>USER</option>
                    <option value="MANAGER" ${user.user_level === 'MANAGER' ? 'selected' : ''}>MANAGER</option>
                </select>
            </p>
        `;
        document.getElementById('modal-footer').innerHTML = `
            <button onclick="saveUserInfo()" style="background-color: #28a745;">저장</button>
            <button onclick="openDetailModal(${user.user_id})" style="background-color: #6c757d;">취소</button>
        `;
    }

    async function saveUserInfo() {
        const updatedData = {
            user_name: document.getElementById('edit-name').value,
            user_nickname: document.getElementById('edit-nickname').value,
            user_phone: document.getElementById('edit-phone').value,
            user_status: document.getElementById('edit-status').value,
            user_level: document.getElementById('edit-level').value,
        };

        if(!confirm("이대로 수정하시겠습니까?")) return;

        try {
            const response = await fetch(`${API_BASE_URL}/user/${currentDetailUserId}`, {
                method: 'PATCH',
                headers: getAuthHeaders(), // 수정 요청 시에도 토큰 필수
                body: JSON.stringify(updatedData)
            });
            
            if (response.status === 401) {
                localStorage.removeItem('admin_token');
                alert("인증이 만료되었습니다. 다시 로그인해주세요.");
                window.location.href = 'login.html';
                return;
            }

            if(!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

            alert("수정되었습니다.");
            closeModal();
            handleSearch(); 

        } catch (error) {
            alert('수정에 실패했습니다. 콘솔 창을 확인해주세요.');
            console.error('Update Error:', error);
        }
    }
</script>

</body>
</html>
